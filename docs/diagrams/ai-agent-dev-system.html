<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Agent 开发系统架构</title>
<style>
:root {
  --bg: #FFFFFF; --sf: #FFFFFF; --sf2: #EEF0F5; --bd: #B0B8C8;
  --blu: #1558D6; --pur: #6D28D9; --grn: #047857;
  --org: #C2410C; --cya: #0369A1;
  --tx: #0D1117; --mt: #374151;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg); font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif; color: var(--tx); }

/* ── Top Nav ── */
.nav {
  position: fixed; top: 0; left: 0; right: 0; height: 56px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 28px; background: var(--bg);
  border-bottom: 1px solid var(--sf2); z-index: 100;
}
.nav-title { font-size: 15px; font-weight: 700; letter-spacing: -0.02em; }
.nav-badge {
  font-size: 10px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase;
  color: var(--blu); background: rgba(21,88,214,.08); padding: 5px 12px; border-radius: 20px;
}
.nav-order {
  display: flex; align-items: center; gap: 10px; font-size: 12px; color: var(--mt);
}
.nav-order-num {
  font-weight: 700; color: var(--blu); font-variant-numeric: tabular-nums;
  background: rgba(21,88,214,.1); padding: 4px 10px; border-radius: 8px;
}
.nav-order-title { font-weight: 600; color: var(--tx); }

/* ── Main SVG area ── */
.main {
  position: fixed; top: 92px; left: 0; right: 0; bottom: 88px;
  display: flex; align-items: center; justify-content: center;
  background: var(--bg);
}
#main-svg { width: 100%; max-width: 960px; height: auto; }

/* ── Node styles ── */
.node { fill: var(--sf); stroke: var(--bd); stroke-width: 2; filter: drop-shadow(0 2px 8px rgba(0,0,0,.10)); }
.node-label { font-size: 12px; font-weight: 600; fill: var(--tx); text-anchor: middle; }
.node-sub { font-size: 9px; fill: var(--mt); text-anchor: middle; }

/* Chip */
.chip { fill: var(--sf2); stroke: var(--bd); stroke-width: 1; }
.chip-text { font-size: 8.5px; font-weight: 600; fill: var(--mt); text-anchor: middle; }
.chip.lit-b { fill: rgba(21,88,214,.12); stroke: var(--blu); }
.chip.lit-p { fill: rgba(109,40,217,.12); stroke: var(--pur); }
.chip.lit-g { fill: rgba(4,120,87,.12); stroke: var(--grn); }
.chip.lit-o { fill: rgba(194,65,12,.12); stroke: var(--org); }
.chip.lit-c { fill: rgba(3,105,161,.12); stroke: var(--cya); }
.chip.lit-b .chip-text, .chip.lit-p .chip-text, .chip.lit-g .chip-text,
.chip.lit-o .chip-text, .chip.lit-c .chip-text { fill: var(--tx); }

/* Zone */
.zone { fill: rgba(0,0,0,.02); stroke: var(--bd); stroke-width: 1.5; stroke-dasharray: 5 4; }
.zone-label { font-size: 9.5px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; fill: var(--mt); }

/* Connections */
.conn { fill: none; stroke-width: 2.5; stroke-dasharray: 8 5; opacity: 0.3; }
.conn-label { font-size: 9px; fill: var(--mt); text-anchor: middle; opacity: 0; transition: opacity .3s; }
.conn-label.show { opacity: 1; }

/* Order badges on nodes — 执行顺序必须在图上可见 */
.order-badge { pointer-events: none; }
.order-ring {
  fill: var(--sf); stroke: var(--bd); stroke-width: 1.5;
  opacity: 0.45; transition: opacity .25s, stroke .25s, fill .25s;
}
.order-num {
  font-size: 10px; font-weight: 700; fill: var(--mt); text-anchor: middle;
  font-variant-numeric: tabular-nums;
}
.order-badge.active .order-ring {
  opacity: 1; stroke: var(--blu); stroke-width: 2;
  fill: rgba(21,88,214,.12);
}
.order-badge.active .order-num { fill: var(--blu); }
.order-badge.done .order-ring {
  opacity: 0.85; stroke: var(--blu); fill: rgba(21,88,214,.08);
}
.order-badge.done .order-num { fill: var(--blu); }

/* Active connection step tag */
.conn-order {
  font-size: 8px; font-weight: 700; fill: var(--blu); text-anchor: middle;
  opacity: 0; transition: opacity .3s;
}
.conn-order.show { opacity: 1; }

/* Full flow strip — 总顺序一览 */
.flow-strip {
  position: fixed; top: 56px; left: 0; right: 0; height: 36px;
  display: flex; align-items: center; justify-content: center; gap: 4px;
  padding: 0 16px; background: var(--sf2); border-bottom: 1px solid var(--sf2);
  z-index: 90; font-size: 10px; color: var(--mt);
}
.flow-strip-inner { display: flex; align-items: center; gap: 2px; flex-wrap: nowrap; max-width: 920px; }
.flow-chip {
  padding: 3px 8px; border-radius: 6px; border: 1px solid var(--bd);
  background: var(--sf); font-weight: 600; white-space: nowrap;
  opacity: 0.5; transition: all .2s;
}
.flow-chip.done { opacity: 0.75; border-color: var(--blu); color: var(--blu); }
.flow-chip.active {
  opacity: 1; background: var(--blu); border-color: var(--blu); color: #fff;
  box-shadow: 0 2px 8px rgba(21,88,214,.25);
}
.flow-arrow { color: var(--bd); font-size: 9px; padding: 0 2px; }

/* Flow animation */
@keyframes dashFwd { to { stroke-dashoffset: -26; } }
@keyframes dashBwd { to { stroke-dashoffset: 26; } }
.conn.fwd { opacity: 1; animation: dashFwd .6s linear infinite; }
.conn.bwd { opacity: 1; animation: dashBwd .6s linear infinite; }

/* Particles */
.particle { opacity: 0; }
.particle-glow { opacity: 0; filter: url(#glow); }

/* ── Bottom control bar ── */
.controls {
  position: fixed; bottom: 0; left: 0; right: 0; height: 88px;
  display: flex; align-items: center; justify-content: center; gap: 24px;
  padding: 0 28px; background: var(--bg);
  border-top: 1px solid var(--sf2); z-index: 100;
}
.step-desc {
  flex: 1; max-width: 520px; font-size: 13px; line-height: 1.55; color: var(--mt);
}
.step-desc .hl-b { color: var(--blu); font-weight: 600; }
.step-desc .hl-p { color: var(--pur); font-weight: 600; }
.step-desc .hl-g { color: var(--grn); font-weight: 600; }
.step-desc .hl-o { color: var(--org); font-weight: 600; }
.step-desc .hl-c { color: var(--cya); font-weight: 600; }

.dots { display: flex; gap: 6px; align-items: center; }
.dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--sf2); border: 1.5px solid var(--bd); transition: all .25s;
}
.dot.active { background: var(--blu); border-color: var(--blu); transform: scale(1.2); }
.dot.done { background: var(--blu); border-color: var(--blu); opacity: .4; }

.btns { display: flex; gap: 8px; }
.btn {
  padding: 8px 16px; border-radius: 8px; border: 1.5px solid var(--bd);
  background: var(--sf); font-size: 12px; font-weight: 600; color: var(--tx);
  cursor: pointer; transition: all .15s;
}
.btn:hover { border-color: var(--blu); color: var(--blu); }
.btn:disabled { opacity: .35; cursor: default; border-color: var(--bd); color: var(--tx); }
.btn-primary { background: var(--blu); border-color: var(--blu); color: #fff; }
.btn-primary:hover { background: #1248b8; }
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-title">AI Agent 开发系统架构</div>
  <div class="nav-order" id="nav-order" style="visibility:hidden">
    <span class="nav-order-num" id="nav-step-num">步骤 1/8</span>
    <span class="nav-order-title" id="nav-step-title"></span>

  <!-- runtime→llm -->
  <circle class="particle-glow" id="pg-runtime-llm" r="9" fill="#6D28D9" opacity="0.3">
    <animateMotion id="am-pg-runtime-llm" begin="indefinite" dur="1.2s" fill="freeze" keyPoints="0;1" keyTimes="0;1" calcMode="linear">
      <mpath href="#conn-runtime-llm"/>
    </animateMotion>
  </circle>
  <circle class="particle" id="p-runtime-llm" r="4.5" fill="#6D28D9" stroke="white" stroke-width="2">
    <animateMotion id="am-p-runtime-llm" begin="indefinite" dur="1.2s" fill="freeze" keyPoints="0;1" keyTimes="0;1" calcMode="linear">
      <mpath href="#conn-runtime-llm"/>
    </animateMotion>
  </circle>

  <!-- llm→runtime -->
  <circle class="particle-glow" id="pg-llm-runtime" r="9" fill="#6D28D9" opacity="0.3">
    <animateMotion id="am-pg-llm-runtime" begin="indefinite" dur="1.2s" fill="freeze" keyPoints="0;1" keyTimes="0;1" calcMode="linear">
      <mpath href="#conn-llm-runtime"/>
    </animateMotion>
  </circle>
  <circle class="particle" id="p-llm-runtime" r="4.5" fill="#6D28D9" stroke="white" stroke-width="2">
    <animateMotion id="am-p-llm-runtime" begin="indefinite" dur="1.2s" fill="freeze" keyPoints="0;1" keyTimes="0;1" calcMode="linear">
      <mpath href="#conn-llm-runtime"/>
    </animateMotion>
  </circle>

  <!-- runtime→tools -->
  <circle class="particle-glow" id="pg-runtime-tools" r="9" fill="#C2410C" opacity="0.3">
    <animateMotion id="am-pg-runtime-tools" begin="indefinite" dur="1.5s" fill="freeze" keyPoints="0;1" keyTimes="0;1" calcMode="linear">
      <mpath href="#conn-runtime-tools"/>
    </animateMotion>
  </circle>
  <circle class="particle" id="p-runtime-tools" r="4.5" fill="#C2410C" stroke="white" stroke-width="2">
    <animateMotion id="am-p-runtime-tools" begin="indefinite" dur="1.5s" fill="freeze" keyPoints="0;1" keyTimes="0;1" calcMode="linear">
      <mpath href="#conn-runtime-tools"/>
    </animateMotion>
  </circle>

  <!-- tools→external -->
  <circle class="particle-glow" id="pg-tools-external" r="9" fill="#C2410C" opacity="0.3">
    <animateMotion id="am-pg-tools-external" begin="indefinite" dur="1.2s" fill="freeze" keyPoints="0;1" keyTimes="0;1" calcMode="linear">
      <mpath href="#conn-tools-external"/>
    </animateMotion>
  </circle>
  <circle class="particle" id="p-tools-external" r="4.5" fill="#C2410C" stroke="white" stroke-width="2">
    <animateMotion id="am-p-tools-external" begin="indefinite" dur="1.2s" fill="freeze" keyPoints="0;1" keyTimes="0;1" calcMode="linear">
      <mpath href="#conn-tools-external"/>
    </animateMotion>
  </circle>

  <!-- external→tools -->
  <circle class="particle-glow" id="pg-external-tools" r="9" fill="#C2410C" opacity="0.3">
    <animateMotion id="am-pg-external-tools" begin="indefinite" dur="1.2s" fill="freeze" keyPoints="0;1" keyTimes="0;1" calcMode="linear">
      <mpath href="#conn-external-tools"/>
    </animateMotion>
  </circle>
  <circle class="particle" id="p-external-tools" r="4.5" fill="#C2410C" stroke="white" stroke-width="2">
    <animateMotion id="am-p-external-tools" begin="indefinite" dur="1.2s" fill="freeze" keyPoints="0;1" keyTimes="0;1" calcMode="linear">
      <mpath href="#conn-external-tools"/>
    </animateMotion>
  </circle>

  <!-- tools→runtime -->
  <circle class="particle-glow" id="pg-tools-runtime" r="9" fill="#C2410C" opacity="0.3">
    <animateMotion id="am-pg-tools-runtime" begin="indefinite" dur="1.5s" fill="freeze" keyPoints="0;1" keyTimes="0;1" calcMode="linear">
      <mpath href="#conn-tools-runtime"/>
    </animateMotion>
  </circle>
  <circle class="particle" id="p-tools-runtime" r="4.5" fill="#C2410C" stroke="white" stroke-width="2">
    <animateMotion id="am-p-tools-runtime" begin="indefinite" dur="1.5s" fill="freeze" keyPoints="0;1" keyTimes="0;1" calcMode="linear">
      <mpath href="#conn-tools-runtime"/>
    </animateMotion>
  </circle>

  <!-- runtime→memory -->
  <circle class="particle-glow" id="pg-runtime-memory" r="9" fill="#047857" opacity="0.3">
    <animateMotion id="am-pg-runtime-memory" begin="indefinite" dur="1.3s" fill="freeze" keyPoints="0;1" keyTimes="0;1" calcMode="linear">
      <mpath href="#conn-runtime-memory"/>
    </animateMotion>
  </circle>
  <circle class="particle" id="p-runtime-memory" r="4.5" fill="#047857" stroke="white" stroke-width="2">
    <animateMotion id="am-p-runtime-memory" begin="indefinite" dur="1.3s" fill="freeze" keyPoints="0;1" keyTimes="0;1" calcMode="linear">
      <mpath href="#conn-runtime-memory"/>
    </animateMotion>
  </circle>

  <!-- runtime→observe -->
  <circle class="particle-glow" id="pg-runtime-observe" r="9" fill="#0369A1" opacity="0.3">
    <animateMotion id="am-pg-runtime-observe" begin="indefinite" dur="1.5s" fill="freeze" keyPoints="0;1" keyTimes="0;1" calcMode="linear">
      <mpath href="#conn-runtime-observe"/>
    </animateMotion>
  </circle>
  <circle class="particle" id="p-runtime-observe" r="4.5" fill="#0369A1" stroke="white" stroke-width="2">
    <animateMotion id="am-p-runtime-observe" begin="indefinite" dur="1.5s" fill="freeze" keyPoints="0;1" keyTimes="0;1" calcMode="linear">
      <mpath href="#conn-runtime-observe"/>
    </animateMotion>
  </circle>

  <!-- runtime→response -->
  <circle class="particle-glow" id="pg-runtime-response" r="9" fill="#1558D6" opacity="0.3">
    <animateMotion id="am-pg-runtime-response" begin="indefinite" dur="1.3s" fill="freeze" keyPoints="0;1" keyTimes="0;1" calcMode="linear">
      <mpath href="#conn-runtime-response"/>
    </animateMotion>
  </circle>
  <circle class="particle" id="p-runtime-response" r="4.5" fill="#1558D6" stroke="white" stroke-width="2">
    <animateMotion id="am-p-runtime-response" begin="indefinite" dur="1.3s" fill="freeze" keyPoints="0;1" keyTimes="0;1" calcMode="linear">
      <mpath href="#conn-runtime-response"/>
    </animateMotion>
  </circle>

</svg>
</div>

<div class="controls">
  <div class="step-desc" id="step-desc"></div>
  <div class="dots" id="dots"></div>
  <div class="btns">
    <button class="btn" id="btn-prev" disabled>← 上一步</button>
    <button class="btn btn-primary" id="btn-next">下一步 →</button>
    <button class="btn" id="btn-reset">重置</button>
  </div>
</div>

<script>
const COLORS = {
  B: { fill: 'rgba(21,88,214,.10)', stroke: '#1558D6', rgb: '21,88,214' },
  P: { fill: 'rgba(109,40,217,.10)', stroke: '#6D28D9', rgb: '109,40,217' },
  G: { fill: 'rgba(4,120,87,.10)', stroke: '#047857', rgb: '4,120,87' },
  O: { fill: 'rgba(194,65,12,.10)', stroke: '#C2410C', rgb: '194,65,12' },
  C: { fill: 'rgba(3,105,161,.10)', stroke: '#0369A1', rgb: '3,105,161' },
};

const CHIP_LIT = { B: 'lit-b', P: 'lit-p', G: 'lit-g', O: 'lit-o', C: 'lit-c' };

const STEPS = [
  {
    title: '用户发起请求',
    html: '① 用户通过 <span class="hl-b">App / Web</span> 发起自然语言请求，经 <span class="hl-b">API Gateway</span> 进入 Agent 系统。',
    nodes: { user: 'B', api: 'B' },
    conns: { 'conn-user-api': ['fwd','on'] },
    labels: ['lbl-user-api'],
    chips: {},
    particles: ['user-api'],
  },
  {
    title: '路由至 Runtime',
    html: '② <span class="hl-b">API Gateway</span> 将请求路由至 <span class="hl-p">Agent Runtime</span>，触发 Plan-Act-Observe 执行循环。',
    nodes: { api: 'B', runtime: 'P' },
    conns: { 'conn-api-runtime': ['fwd','on'] },
    labels: [],
    chips: {},
    particles: ['api-runtime'],
  },
  {
    title: '加载上下文',
    html: '③ <span class="hl-g">Context Engine</span> 组装 RAG 检索、用户 Profile 和 Workspace 上下文，注入 Runtime。',
    nodes: { context: 'G', runtime: 'P' },
    conns: { 'conn-context-runtime': ['fwd','on'] },
    labels: ['lbl-context-runtime'],
    chips: { 'chip-rag': 'G', 'chip-profile': 'G', 'chip-ws': 'G' },
    particles: ['context-runtime'],
  },
  {
    title: 'LLM 推理 · Plan',
    html: '④ <span class="hl-p">Agent Runtime</span> 将上下文发送至 <span class="hl-p">LLM Provider</span> 进行推理，<span class="hl-p">Plan</span> 阶段决定下一步动作。',
    nodes: { runtime: 'P', llm: 'P' },
    conns: { 'conn-runtime-llm': ['fwd','on'], 'conn-llm-runtime': ['bwd','on'] },
    labels: ['lbl-runtime-llm', 'lbl-llm-runtime'],
    chips: { 'chip-plan': 'P' },
    particles: ['runtime-llm', 'llm-runtime'],
  },
  {
    title: '调用工具 · Act',
    html: '⑤ <span class="hl-o">Act</span> 阶段：<span class="hl-p">Runtime</span> 通过 <span class="hl-o">Tool Router</span> 调用 <span class="hl-o">MCP / API</span> 执行外部动作。',
    nodes: { runtime: 'P', tools: 'O', external: 'O' },
    conns: {
      'conn-runtime-tools': ['fwd','on'],
      'conn-tools-external': ['fwd','on'],
      'conn-external-tools': ['bwd','on'],
    },
    labels: ['lbl-runtime-tools'],
    chips: { 'chip-act': 'P', 'chip-mcp': 'O', 'chip-api': 'O' },
    particles: ['runtime-tools', 'tools-external', 'external-tools'],
  },
  {
    title: '观察结果 · Observe',
    html: '⑥ <span class="hl-o">Observe</span> 阶段：工具执行结果回流 <span class="hl-p">Runtime</span>，判断是否继续循环或生成最终回答。',
    nodes: { runtime: 'P', tools: 'O' },
    conns: { 'conn-tools-runtime': ['bwd','on'] },
    labels: ['lbl-tools-runtime'],
    chips: { 'chip-observe': 'P' },
    particles: ['tools-runtime'],
  },
  {
    title: '持久化与可观测',
    html: '⑦ 全程 <span class="hl-c">Observability</span> 采集 Trace / Eval / Log；<span class="hl-g">Memory Store</span> 持久化会话状态供后续召回。',
    nodes: { memory: 'G', observe: 'C', runtime: 'P' },
    conns: {
      'conn-runtime-memory': ['fwd','on'],
      'conn-memory-context': ['bwd','on'],
      'conn-runtime-observe': ['fwd','on'],
    },
    labels: ['lbl-runtime-memory', 'lbl-runtime-observe'],
    chips: { 'chip-trace': 'C', 'chip-eval': 'C', 'chip-log': 'C' },
    particles: ['runtime-memory', 'runtime-observe'],
  },
  {
    title: '返回响应',
    html: '⑧ 任务完成，<span class="hl-p">Runtime</span> 生成最终响应，经 <span class="hl-b">API Gateway</span> 返回给用户。',
    nodes: { runtime: 'P', response: 'B', api: 'B', user: 'B' },
    conns: {
      'conn-runtime-response': ['fwd','on'],
      'conn-response-api': ['fwd','on'],
      'conn-user-api': ['bwd','on'],
    },
    labels: ['lbl-runtime-response'],
    chips: {},
    particles: ['runtime-response'],
  },
];

const STEP_ORDER = [1, 2, 3, 4, 5, 6, 7, 8];
const ORDER_BADGE_IDS = [
  'order-user', 'order-api', 'order-context', 'order-runtime', 'order-llm',
  'order-tools', 'order-external', 'order-memory', 'order-observe', 'order-response',
];

let currentStep = -1;
const allNodeIds = ['user','api','context','runtime','llm','tools','external','memory','observe','response'];
const allConnIds = [
  'conn-user-api','conn-api-runtime','conn-context-runtime','conn-runtime-llm','conn-llm-runtime',
  'conn-runtime-tools','conn-tools-external','conn-external-tools','conn-tools-runtime',
  'conn-runtime-memory','conn-memory-context','conn-runtime-observe','conn-runtime-response','conn-response-api'
];
const allChipIds = ['chip-rag','chip-profile','chip-ws','chip-plan','chip-act','chip-observe','chip-mcp','chip-api','chip-trace','chip-eval','chip-log'];
const allLabelIds = [
  'lbl-user-api','lbl-context-runtime','lbl-runtime-llm','lbl-llm-runtime',
  'lbl-runtime-tools','lbl-tools-runtime','lbl-runtime-memory','lbl-runtime-observe','lbl-runtime-response'
];

function resetAll() {
  allNodeIds.forEach(id => {
    const g = document.getElementById('node-' + id);
    if (!g) return;
    const rect = g.querySelector('.node');
    if (rect) {
      rect.style.fill = '';
      rect.style.stroke = '';
      rect.style.strokeWidth = '';
      rect.style.filter = '';
    }
  });
  allConnIds.forEach(id => {
    const el = document.getElementById(id);
    if (el) { el.className = 'conn'; el.style.opacity = ''; }
  });
  allChipIds.forEach(id => {
    const el = document.getElementById(id);
    if (el) el.className = 'chip';
  });
  allLabelIds.forEach(id => {
    const el = document.getElementById(id);
    if (el) el.classList.remove('show');
  });
  document.querySelectorAll('.particle, .particle-glow').forEach(el => el.style.opacity = '0');
  document.querySelectorAll('.conn-order').forEach(el => el.classList.remove('show'));
  ORDER_BADGE_IDS.forEach(id => {
    const el = document.getElementById(id);
    if (el) el.className = 'order-badge';
  });
}

function updateOrderUI(idx) {
  const navOrder = document.getElementById('nav-order');
  const ord = idx < 0 ? 0 : STEP_ORDER[idx];
  if (idx < 0) {
    navOrder.style.visibility = 'hidden';
  } else {
    navOrder.style.visibility = 'visible';
    document.getElementById('nav-step-num').textContent = `步骤 ${idx + 1}/${STEPS.length}`;
    document.getElementById('nav-step-title').textContent = STEPS[idx].title;
  }
  ORDER_BADGE_IDS.forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    const n = parseInt(el.dataset.order, 10);
    if (idx < 0) {
      el.className = 'order-badge';
      return;
    }
    let cls = 'order-badge';
    if (n < ord) cls += ' done';
    else if (n === ord || (ord === 7 && n === 7) || (ord === 6 && id === 'order-runtime')) cls += ' active';
    el.className = cls;
  });
  document.querySelectorAll('.conn-order').forEach(el => el.classList.remove('show'));
  if (idx >= 0) {
    const ordEl = document.getElementById('ord-' + idx);
    if (ordEl) ordEl.classList.add('show');
  }
  document.querySelectorAll('.flow-chip').forEach((chip, i) => {
    chip.className = 'flow-chip' + (i === idx ? ' active' : i < idx ? ' done' : '');
  });
}

function buildFlowStrip() {
  const inner = document.getElementById('flow-strip-inner');
  STEPS.forEach((s, i) => {
    const chip = document.createElement('span');
    chip.className = 'flow-chip';
    chip.textContent = `${i + 1} ${s.title}`;
    chip.title = s.title;
    inner.appendChild(chip);
    if (i < STEPS.length - 1) {
      const arr = document.createElement('span');
      arr.className = 'flow-arrow';
      arr.textContent = '→';
      inner.appendChild(arr);
    }
  });
}

function activateNode(id, colorKey) {
  const g = document.getElementById('node-' + id);
  if (!g) return;
  const rect = g.querySelector('.node');
  const c = COLORS[colorKey];
  if (rect && c) {
    rect.style.fill = c.fill;
    rect.style.stroke = c.stroke;
    rect.style.strokeWidth = '2.5';
    rect.style.filter = `drop-shadow(0 4px 10px rgba(${c.rgb},.28))`;
  }
}

function activateConn(id, animClass) {
  const el = document.getElementById(id);
  if (!el) return;
  el.className = 'conn ' + animClass;
  el.style.opacity = '1';
}

function triggerParticle(key) {
  const p = document.getElementById('p-' + key);
  const pg = document.getElementById('pg-' + key);
  if (!p || !pg) return;
  p.style.opacity = '1';
  pg.style.opacity = '0.3';
  const animP = document.getElementById('am-p-' + key);
  const animPg = document.getElementById('am-pg-' + key);
  const dur = parseFloat(animP?.getAttribute('dur') || '1.2') * 1000;
  if (animP) animP.beginElement();
  if (animPg) animPg.beginElement();
  setTimeout(() => { p.style.opacity = '0'; pg.style.opacity = '0'; }, dur);
}

function applyStep(idx) {
  resetAll();
  if (idx < 0) {
    document.getElementById('step-desc').innerHTML = '点击 <strong>下一步</strong> 或按 → / Space 开始演示。<strong>顶部横条</strong>为总执行顺序，节点角标为顺序号。';
    updateDots(-1);
    updateOrderUI(-1);
    return;
  }
  const step = STEPS[idx];
  document.getElementById('step-desc').innerHTML = step.html;

  Object.entries(step.nodes).forEach(([id, color]) => activateNode(id, color));

  Object.entries(step.conns).forEach(([id, [anim]]) => activateConn(id, anim));

  (step.labels || []).forEach(lid => {
    const el = document.getElementById(lid);
    if (el) el.classList.add('show');
  });

  Object.entries(step.chips || {}).forEach(([id, color]) => {
    const el = document.getElementById(id);
    if (el) el.className = 'chip ' + (CHIP_LIT[color] || '');
  });

  (step.particles || []).forEach(key => triggerParticle(key));

  updateDots(idx);
  updateOrderUI(idx);
}

function updateDots(idx) {
  const container = document.getElementById('dots');
  container.innerHTML = '';
  STEPS.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i === idx ? ' active' : i < idx ? ' done' : '');
    container.appendChild(d);
  });
}

function goTo(idx) {
  currentStep = idx;
  applyStep(idx);
  document.getElementById('btn-prev').disabled = idx <= 0;
  document.getElementById('btn-next').disabled = idx >= STEPS.length - 1;
  document.getElementById('btn-next').textContent = idx >= STEPS.length - 1 ? '完成' : '下一步 →';
}

document.getElementById('btn-next').addEventListener('click', () => {
  if (currentStep < STEPS.length - 1) goTo(currentStep + 1);
});
document.getElementById('btn-prev').addEventListener('click', () => {
  if (currentStep > 0) goTo(currentStep - 1);
});
document.getElementById('btn-reset').addEventListener('click', () => goTo(-1));

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); if (currentStep < STEPS.length - 1) goTo(currentStep + 1); }
  if (e.key === 'ArrowLeft') { if (currentStep > 0) goTo(currentStep - 1); }
  if (e.key === 'r' || e.key === 'R') goTo(-1);
});

/* Init dots + initial state */
buildFlowStrip();
STEPS.forEach(() => document.getElementById('dots').appendChild(document.createElement('div')));
goTo(-1);
</script>
</body>
</html>
