      <text x="26" y="120" fill="#657067" font-size="18">已确认判断的完整规格</text>
      <text x="26" y="148" fill="#657067" font-size="18">流程 · 状态 · 验收</text>
    </g>
    <g transform="translate(462 478)">
      <rect width="315" height="170" rx="8" fill="#e2eadf"/>
      <text x="26" y="42" fill="#496b5a" font-size="18" font-weight="700">06</text>
