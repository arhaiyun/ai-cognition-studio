<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <rect width="1600" height="900" fill="#253b31"/>
  <text x="100" y="112" fill="#f5f2e9" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="48" font-weight="700">Project Incubator</text>
  <text x="100" y="158" fill="#a9bbae" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="23">从模糊想法到可执行规格的八阶段决策工作流</text>

  <g font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
    <g transform="translate(100 242)">
      <rect width="315" height="170" rx="8" fill="#f7f5ee"/>
      <text x="26" y="42" fill="#9a6b3f" font-size="18" font-weight="700">01</text>
      <text x="26" y="84" fill="#20251f" font-size="27" font-weight="700">领域识别</text>
      <text x="26" y="120" fill="#657067" font-size="18">专家激活 · 深度维度</text>
      <text x="26" y="148" fill="#657067" font-size="18">确认后进入访谈</text>
    </g>
    <g transform="translate(462 242)">
