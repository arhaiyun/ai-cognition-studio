      <text x="26" y="84" fill="#20251f" font-size="27" font-weight="700">视觉预览</text>
      <text x="26" y="120" fill="#657067" font-size="18">3–5 页轻量 HTML</text>
      <text x="26" y="148" fill="#657067" font-size="18">在 PRD 前发现理解偏差</text>
