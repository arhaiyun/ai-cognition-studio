      <text x="26" y="84" fill="#20251f" font-size="27" font-weight="700">产品方案</text>
      <text x="26" y="120" fill="#657067" font-size="18">范围 · 流程 · 优先级</text>
      <text x="26" y="148" fill="#657067" font-size="18">方案确认后锁定方向</text>
    </g>
    <g transform="translate(1186 242)">
