      <text x="26" y="42" fill="#9a6b3f" font-size="18" font-weight="700">02</text>
      <text x="26" y="84" fill="#20251f" font-size="27" font-weight="700">需求访谈</text>
      <text x="26" y="120" fill="#657067" font-size="18">用户 · 场景 · 约束</text>
      <text x="26" y="148" fill="#657067" font-size="18">多轮澄清，不替用户假设</text>
